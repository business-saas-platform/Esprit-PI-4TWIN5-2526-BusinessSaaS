version: "3.9"

# Configured for local deployment on a Tunisian server to satisfy Law No. 2004-63.

services:
	web:
		build:
			context: .
			dockerfile: Dockerfile
		ports:
			- "3000:3000"
		environment:
			NODE_ENV: production
			TENANT_ID: ""
			TENANT_REGION: "TN"
			TENANT_TIER: ""
			DATABASE_URL: postgres://app_user:app_password@db:5432/app_db
		depends_on:
			- db
		networks:
			- internal_net

	db:
		image: postgres:16-alpine
		environment:
			POSTGRES_DB: app_db
			POSTGRES_USER: app_user
			POSTGRES_PASSWORD: app_password
		volumes:
			- db_data:/var/lib/postgresql/data
		networks:
			- internal_net

volumes:
	db_data:

networks:
	internal_net:
		driver: bridge
